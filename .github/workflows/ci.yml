name: CI

on:
  push:
    branches: [main, transitioned-from-sp1-to-snark]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Compile Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contracts/package-lock.json
      - run: cd contracts && npm ci
      - run: cd contracts && npx hardhat compile

  orchestrator:
    name: TypeCheck Orchestrator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ai-orchestrator/package-lock.json
      - run: cd ai-orchestrator && npm ci
      - run: cd ai-orchestrator && npx tsc --noEmit

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mission-control/package-lock.json
      - run: cd mission-control && npm ci
      - run: cd mission-control && npm run build
        env:
          RPC_ENDPOINT: https://evmrpc-testnet.0g.ai/
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
